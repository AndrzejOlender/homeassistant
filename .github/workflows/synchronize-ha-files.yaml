name: Synchronize Modified Files to Kubernetes Volume

on:
  push:
    branches:
      - master 

jobs:
  sync_files:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2
      with:
        fetch-depth: 2

    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > kubeconfig.yaml
        echo "KUBECONFIG=$(pwd)/kubeconfig.yaml" >> $GITHUB_ENV

    - name: Print POD_NAME
      run: echo "POD_NAME=$POD_NAME"

    - name: Identify and Copy Changed Files to Volume
      run: |
        changed_files=$(git diff HEAD~1 --name-only)
        for file in $changed_files; do
          full_path=$(pwd)/$file
          echo "Copying file: $full_path"
          kubectl cp $full_path smart-home/$POD_NAME:/config -c homeassistant || exit 1
        done


